<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><title>WhatsApp QR</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Tahoma;background:#0f0f23;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center}.box{background:#1a1a3e;padding:40px;border-radius:16px;text-align:center;border:1px solid rgba(37,211,102,0.3)}h1{color:#25D366;margin-bottom:20px}img{width:280px;height:280px;border-radius:12px}p{color:#888;margin-top:15px;font-size:14px}.status{margin-top:10px;padding:8px 16px;border-radius:8px;display:inline-block}.connected{background:rgba(37,211,102,0.2);color:#25D366}.disconnected{background:rgba(255,82,82,0.2);color:#ff5252}a{color:#4fc3f7;text-decoration:none}</style></head>
<body><div class="box"><h1>📱 WhatsApp QR Code</h1><div id="status" class="status disconnected">جاري التحميل...</div><br><br><img id="qr" src="" alt="QR Code" style="display:none"><p id="msg">جاري توليد QR Code...</p><p><a href="/dashboard/">← Dashboard</a> | <a href="/send">إرسال رسالة</a></p></div>
<script>const s=io();s.on('qr',d=>{document.getElementById('qr').src=d;document.getElementById('qr').style.display='block';document.getElementById('msg').textContent='امسح الـ QR Code بـ WhatsApp';});s.on('ready',d=>{document.getElementById('qr').style.display='none';document.getElementById('msg').textContent='✅ متصل بـ WhatsApp!';document.getElementById('status').className='status connected';document.getElementById('status').textContent='متصل';});s.on('status',d=>{if(d.connected){document.getElementById('status').className='status connected';document.getElementById('status').textContent='متصل';}});fetch('/api/qr').then(r=>r.json()).then(d=>{if(d.connected){document.getElementById('msg').textContent='✅ متصل بـ WhatsApp!';document.getElementById('status').className='status connected';document.getElementById('status').textContent='متصل';}else if(d.qr){document.getElementById('qr').src=d.qr;document.getElementById('qr').style.display='block';}});</script>
<script src="/socket.io/socket.io.js"></script></body></html>
